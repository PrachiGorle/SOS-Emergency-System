<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>Log Emergency Call</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
}

/* HEADER */

header{
background:#1a6b3c;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

/* CONTAINER */

.container{
width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.container h2{
margin-top:0;
color:#1a6b3c;
}

/* FORM STYLE */

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#1a6b3c;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#145530;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
margin-top:40px;
color:#777;
}
.logo-area{
display:flex;
align-items:center;
gap:10px;
}
.logo{
font-size:28px;
}
</style>

</head>

<body>

<header>
<div class="logo-area">
<i class="fa-solid fa-truck-medical logo"></i>
<h1>SOS Emergency System</h1>
</div>


<nav>
<a href="index.php">Dashboard</a>
<a href="create_incident.html">Create Incident</a>
<a href="add_casualty.html">Add Casualty</a>
<a href="assign_team.html">Assign Team</a>
<a href="add_hospital.html">Add Hospital</a>
</nav>
</header>


<div class="container">

<h2>🆘 Log Emergency Call</h2>

<form id="callForm">

<label>Caller Phone:</label>
<input type="text" name="caller_phone" required>

<label>Latitude:</label>
<input type="number" name="latitude" step="0.000001" required>

<label>Longitude:</label>
<input type="number" name="longitude" step="0.000001" required>

<button type="submit">Log Call</button>

</form>

</div>

<footer>
SOS Emergency System | DBMS Project
</footer>


<script>
document.getElementById("callForm").addEventListener("submit", function(e){
    e.preventDefault();

    const formData = new FormData(this);

    fetch("api_log_call.php", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {
        data = data.trim();
        if(data.trim() === "SUCCESS"){
            alert("Emergency call logged successfully!");
            this.reset();
        } else {
            alert("Error: " + data);
        }
    })
    .catch(err => {
        alert("Server connection failed: " + err);
    });

});
</script>

</body>
</html>
