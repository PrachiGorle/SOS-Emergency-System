<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>Add Casualty</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
}

/* HEADER */

header{
background:#1a6b3c;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

/* CONTAINER */

.container{
width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.container h2{
margin-top:0;
color:#1a6b3c;
}

/* FORM STYLE */

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#1a6b3c;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#145530;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
margin-top:40px;
color:#777;
}
.logo-area{
display:flex;
align-items:center;
gap:10px;
}
.logo{
font-size:28px;
}

</style>

</head>

<body>

<header>
<div class="logo-area">
<i class="fa-solid fa-truck-medical logo"></i>
<h1>SOS Emergency System</h1>
</div>

<nav>
<a href="index.php">Dashboard</a>
<a href="log_call.html">Log Call</a>
<a href="create_incident.html">Create Incident</a>
<a href="assign_team.html">Assign Team</a>
<a href="add_hospital.html">Add Hospital</a>
</nav>
</header>


<div class="container">

<h2>Report a Casualty</h2>

<form id="casualtyForm">

<label>Incident:</label>
<select name="incident_id" required>
<option value="1">Incident 1</option>
<option value="2">Incident 2</option>
</select>

<label>Victim Name:</label>
<input type="text" name="name" placeholder="Unknown">

<label>Age:</label>
<input type="number" name="age" min="0" max="120">

<label>Triage Color:</label>
<select name="triage_color" required>
<option value="Red">Red Critical</option>
<option value="Yellow">Yellow Serious</option>
<option value="Green">Green Minor</option>
<option value="Black">Black Deceased</option>
</select>

<label>Hospital:</label>
<select name="admitted_hospital_id">
<option value="">Not Assigned</option>
<option value="1">City General Hospital</option>
<option value="2">Pune Relief Centre</option>
</select>

<button type="submit">Add Casualty</button>

</form>

</div>

<footer>
SOS Emergency System | DBMS Project
</footer>


<script>
document.getElementById("casualtyForm").addEventListener("submit", function(e){
e.preventDefault();

const formData = new FormData(this);

fetch("api_add_casualty.php", {
method: "POST",
body: formData
})
.then(res => res.text())
.then(data => {
if(data.trim() === "SUCCESS") {
alert("Casualty added successfully!");
this.reset();
} else {
alert("Failed to add casualty: " + data);
}
})
.catch(err => {
alert("Error: " + err);
});
});
</script>

</body>
</html>
