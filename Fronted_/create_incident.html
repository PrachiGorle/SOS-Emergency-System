/* FORM STYLE */

input,select{

<body>

<header>

<div class="logo-area">
<i class="fa-solid fa-truck-medical logo"></i>
<h1>SOS Emergency System</h1>
</div>

<nav>
<a href="index.php">Dashboard</a>
<a href="log_call.html">Log Call</a>
<a href="add_casualty.html">Add Casualty</a>
<a href="assign_team.html">Assign Team</a>
<a href="add_hospital.html">Add Hospital</a>
</nav>

</header>


<div class="container">

<h2> Create Incident from Emergency Call</h2>

<form action="save_incident.php" method="POST">

<label>Emergency Call ID:</label>
<input type="number" name="trigger_call_id" required>

<label>Type:</label>
<select name="type" required>
<option value="Fire">Fire</option>
<option value="Flood">Flood</option>
<option value="Accident">Accident</option>
<option value="Earthquake">Earthquake</option>
<option value="Other">Other</option>
</select>

<label>Severity (1=Low, 5=Critical):</label>
<input type="number" name="severity" min="1" max="5" required>

<label>City:</label>
<input type="text" name="city" required>

<button type="submit">Create Incident</button>

</form>

</div>


<footer>
SOS Emergency System | DBMS Project
</footer>


<script>

document.getElementById("incidentForm").addEventListener("submit", function(e){

e.preventDefault();

const formData = new FormData(this);

fetch("api_create_incident.php", {
method: "POST",
body: formData
})

.then(res => res.text())

.then(data => {

data = data.trim();

if(data.includes("success")){
alert("Incident created successfully!");
this.reset();
}
else{
alert("Error: " + data);
}

})

.catch(err => {
alert("Server connection failed: " + err);
});

});

const params = new URLSearchParams(window.location.search);
const callId = params.get("call_id");

document.getElementById("call_id").value = callId;

</script>

</body>
